name: Snyk Security Scan

on:
  push:
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies (with fallback)
      run: npm install --legacy-peer-deps

    - name: Compile the app
      run: npm run build

    - name: Install Snyk
      run: npm install -g snyk

    - name: Install Snyk Delta
      run: npm i -g snyk-delta

    - name: Run Snyk SCA Scan w/ delta
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: snyk test --json --print-deps | snyk-delta --baselineOrg 884d2ae0-651f-4927-aed5-abd795e75eff --baselineProject 11f074c2-ef6d-4642-8ef2-e241332d413a
